<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dia Care - Reset Password</title>
    <meta name="description"
        content="Reset your Dia Care account password. Enter your email and we'll send you a recovery link.">
    <meta name="theme-color" content="#6a3ec4">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <link rel="stylesheet" href="styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script>
        if (localStorage.getItem('diacare_theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>

<body>
    <div class="container">
        <div class="info-section">
            <div class="info-content">
                <div class="logo auth-logo">
                    <svg width="40" height="40" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <path d="M 15 10 L 55 10 C 100 10 100 90 55 90 L 15 90 Z" fill="white" />
                        <path d="M 55 25 C 55 25 75 55 75 70 A 20 20 0 0 1 35 70 C 35 55 55 25 55 25 Z"
                            fill="#ff6b6b" />
                    </svg>
                    <h1>DiaCare</h1>
                </div>
                <h2 data-i18n="forgotPasswordTitle">Reset your password</h2>
                <p class="subtitle" data-i18n="forgotPasswordDesc">Enter your email and we'll send you a recovery link.</p>
            </div>
            <div class="background-decorations" aria-hidden="true">
                <div class="circle circle-1"></div>
                <div class="circle circle-2"></div>
            </div>
        </div>

        <div class="form-section">
            <div class="form-container">
                <div class="form-controls" role="toolbar" aria-label="Page settings">
                    <button id="theme-toggle" type="button" data-i18n-aria="ariaToggleTheme"
                        aria-label="Toggle dark mode">
                        <i class="fas fa-moon" id="theme-icon" aria-hidden="true"></i>
                    </button>
                    <button id="lang-toggle" type="button" data-i18n-aria="ariaSwitchLanguage"
                        aria-label="Switch language">
                        عربي
                    </button>
                </div>

                <form id="form-forgot-password" novalidate autocomplete="on">
                    <div class="form-header">
                        <h2 data-i18n="forgotPasswordTitle">Reset your password</h2>
                        <p data-i18n="forgotPasswordDesc">Enter your email and we'll send you a recovery link.</p>
                    </div>

                    <div class="input-group">
                        <label for="reset-email" data-i18n="emailLabel">Email Address</label>
                        <input type="email" id="reset-email" name="email"
                            placeholder="name@example.com" data-i18n-placeholder="emailPlaceholder"
                            autocomplete="email" inputmode="email" spellcheck="false"
                            autocapitalize="none" required>
                        <small class="field-hint" id="reset-email-hint" aria-live="polite"></small>
                    </div>

                    <div class="form-error" id="reset-error" role="alert" aria-live="assertive" hidden>
                        <i class="fas fa-exclamation-circle icon" aria-hidden="true"></i>
                        <span class="error-text"></span>
                    </div>

                    <button type="submit" class="btn-primary" id="reset-submit-btn">
                        <span class="btn-label" data-i18n="sendResetLink">Send Reset Link</span>
                        <span class="spinner" aria-hidden="true"></span>
                    </button>

                    <div style="text-align: center; margin-top: 1.5rem;">
                        <a href="index.html" class="forgot-password" data-i18n="backToLogin">Back to Login</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const themeToggleBtn = document.getElementById('theme-toggle');
            const themeIcon = document.getElementById('theme-icon');

            const savedTheme = localStorage.getItem('diacare_theme');
            if (savedTheme === 'dark' && themeIcon) {
                themeIcon.className = 'fas fa-sun';
            }

            if (themeToggleBtn) {
                themeToggleBtn.addEventListener('click', () => {
                    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                    if (isDark) {
                        document.documentElement.removeAttribute('data-theme');
                        themeIcon.className = 'fas fa-moon';
                        localStorage.setItem('diacare_theme', 'light');
                    } else {
                        document.documentElement.setAttribute('data-theme', 'dark');
                        themeIcon.className = 'fas fa-sun';
                        localStorage.setItem('diacare_theme', 'dark');
                    }
                });
            }
        });
    </script>
    <script type="module" src="forgot-password.js"></script>
    <script src="i18n.js"></script>
</body>

</html>
